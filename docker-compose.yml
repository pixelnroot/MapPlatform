services:
  postgres:
    image: postgis/postgis:15-3.4
    network_mode: host
    environment:
      POSTGRES_DB: mapdb
      POSTGRES_USER: mapuser
      POSTGRES_PASSWORD: mappass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/src/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mapuser -d mapdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    network_mode: host
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://mapuser:mappass@localhost:5432/mapdb
      ADMIN_KEY: admin123
      UPLOADS_DIR: ./uploads
      JWT_SECRET: map-platform-jwt-secret-change-in-production
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
        VITE_ADMIN_KEY: "admin123"
    network_mode: host
    environment:
      - NGINX_PORT=8080
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
